---
on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  publish:
    runs-on: codeberg-small
    container:
      image: ghcr.io/mcanouil/quarto-codespaces:latest
    steps:
      - uses: https://github.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build
        run: |
          uv run .github/scripts/build.py

      # This is only done on Codeberg but we still need the GitHub hosted files (128MB limit)
      - name: Cleanup
        run: |
          rm -f _site/apps/public/mortar/*.csv
          rm -f _site/apps/public/mortar/*.smi

      - uses: actions/git-pages@v2
        with:
          site: https://adafede.codeberg.page/marimo
          token: ${{ forge.token }}
          source: _site/
